# Release workflow — runs goreleaser on every v* tag and publishes binaries
# to the GitHub Releases page. install.sh fetches from there.
#
# Trigger:
#   git tag v0.1.0
#   git push origin v0.1.0
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # required to create the GitHub Release
  id-token: write    # reserved for future signing/cosign

jobs:
  release:
    runs-on: macos-14    # Apple silicon runner; cross-compiles to amd64 too
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # goreleaser needs full history to compute the changelog from
          # commits since the last tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        # Block release if tests fail — protects users from broken binaries.
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
