<?xml version="1.0" encoding="UTF-8"?>
<!--
  mistah favicon — simplified broom optimized for 16x16 / 32x32 display.

  Design choices vs the hero broom:
  - Cream background fills the entire viewBox so the icon stands out on
    light browser chrome (default white/silver).
  - Handle is thicker proportionally (4px of 32) — at 16px tab size the
    original 12-of-480 ratio would be invisible.
  - Only 5 bristles (vs 10) — extra strands become noise at favicon scale.
  - Slight tilt (-8°) to read as "in motion" even when static.
  - All shapes use the same brutalist palette as the landing for coherence.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cream square background (rounded, brutalist style) -->
  <rect x="0" y="0" width="32" height="32" rx="4" fill="#f4ead0"/>

  <!-- Broom assembly tilted slightly for life -->
  <g transform="rotate(-8 16 16)">
    <!-- Handle: dark green vertical, with orange grain stripe inside -->
    <rect x="14" y="4" width="4" height="17" fill="#0d2a1d"/>
    <rect x="15" y="5" width="2" height="14" fill="#ff6b35"/>

    <!-- Bristle mount: dark block sitting flush at handle's bottom -->
    <rect x="9" y="20" width="14" height="4" fill="#0d2a1d"/>
    <!-- Jade accent stripe inside the mount -->
    <rect x="10" y="22" width="12" height="1" fill="#4dd99a"/>

    <!-- Bristles: 5 strands, alternating yellow + orange -->
    <line x1="10" y1="24" x2="9"  y2="29" stroke="#ffd23f" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="13" y1="24" x2="13" y2="30" stroke="#ff6b35" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="16" y2="30" stroke="#ffd23f" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="19" y1="24" x2="19" y2="30" stroke="#ff6b35" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="22" y1="24" x2="23" y2="29" stroke="#ffd23f" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
